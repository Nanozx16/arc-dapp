<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 ARC Guess Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #12121e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 40px rgba(100, 80, 255, 0.15);
    }

    h1 { font-size: 2rem; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      background: #0d0d1a;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .stat-row span:last-child { color: #a78bfa; font-weight: 600; }

    .numbers {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 24px 0;
    }

    .num-btn {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0ff;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 16px 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .num-btn:hover  { background: #6d28d9; border-color: #7c3aed; transform: scale(1.05); }
    .num-btn.selected { background: #7c3aed; border-color: #a78bfa; }
    .num-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .guess-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .guess-btn:hover    { opacity: 0.85; }
    .guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .connect-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #059669, #0d9488);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      transition: opacity 0.2s;
    }
    .connect-btn:hover { opacity: 0.85; }

    .msg {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
    }
    .msg.win  { background: #064e3b; color: #6ee7b7; display: block; }
    .msg.lose { background: #1e1b4b; color: #a5b4fc; display: block; }
    .msg.err  { background: #450a0a; color: #fca5a5; display: block; }
    .msg.info { background: #1e1b4b; color: #a5b4fc; display: block; }

    .winner-box {
      margin-top: 12px;
      padding: 10px 14px;
      background: #0d0d1a;
      border-radius: 10px;
      font-size: 0.78rem;
      color: #888;
      word-break: break-all;
    }
    .winner-box span { color: #a78bfa; }

    .fee-note { text-align: center; color: #555; font-size: 0.8rem; margin-top: 10px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎯 ARC Guess Game</h1>
  <p class="subtitle">Pick a number 1–10 · Pay 0.01 · Win the pot!</p>

  <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

  <div id="gameArea" style="display:none">
    <div class="stat-row"><span>Round</span><span id="round">#—</span></div>
    <div class="stat-row"><span>Pot</span><span id="pot">— USDC</span></div>
    <div class="stat-row"><span>Entry Fee</span><span>0.01 USDC</span></div>

    <div class="numbers" id="numbers"></div>

    <button class="guess-btn" id="guessBtn" onclick="submitGuess()" disabled>Select a number</button>
    <p class="fee-note">90% of pot goes to winner · 10% fee</p>

    <div class="msg" id="msg"></div>

    <div class="winner-box" id="winnerBox" style="display:none">
      Last winner: <span id="lastWinner"></span><br/>
      Won: <span id="lastWin"></span> USDC
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
  const CONTRACT_ADDRESS = "0x5e3511E781982423Df3926F569d08eF04e0BaA26";
  const CHAIN_ID         = "0x4cef52";
  const RPC_URL          = "https://arc-testnet.drpc.org";
  const ABI = [
    "function guess(uint256 number) external payable",
    "function getInfo() external view returns (uint256,uint256,uint256,uint256,address,uint256)",
    "event Guessed(address indexed player, uint256 guess, bool correct, uint256 pot)"
  ];

  let provider, signer, contract, selectedNumber = null;

  window.addEventListener("load", () => {
    // Build number buttons after DOM is ready
    const grid = document.getElementById("numbers");
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement("button");
      btn.className = "num-btn";
      btn.textContent = i;
      btn.onclick = () => selectNumber(i, btn);
      grid.appendChild(btn);
    }

    // Check if MetaMask is already available
    if (window.ethereum) {
      document.getElementById("connectBtn").textContent = "Connect MetaMask";
    } else {
      document.getElementById("connectBtn").textContent = "⚠️ Install MetaMask";
    }
  });

  function selectNumber(n, btn) {
    selectedNumber = n;
    document.querySelectorAll(".num-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    const guessBtn = document.getElementById("guessBtn");
    guessBtn.disabled = false;
    guessBtn.textContent = `Guess ${n} →`;
  }

  async function connectWallet() {
    // Re-check ethereum on click in case MetaMask loaded late
    const eth = window.ethereum;
    if (!eth) {
      showMsg("MetaMask not detected. Make sure it's installed and you're not opening this as a file:// URL — use a local server or drag into browser.", "err");
      return;
    }

    try {
      await eth.request({ method: "eth_requestAccounts" });

      try {
        await eth.request({ method: "wallet_switchEthereumChain", params: [{ chainId: CHAIN_ID }] });
      } catch (e) {
        if (e.code === 4902 || e.code === -32603) {
          await eth.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: CHAIN_ID,
              chainName: "ARC Testnet",
              nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
              rpcUrls: [RPC_URL],
              blockExplorerUrls: ["https://testnet.arcscan.app"]
            }]
          });
        } else { throw e; }
      }

      provider = new ethers.BrowserProvider(eth);
      signer   = await provider.getSigner();
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

      const addr = await signer.getAddress();
      const btn  = document.getElementById("connectBtn");
      btn.textContent = "✅ " + addr.slice(0,6) + "..." + addr.slice(-4);
      btn.disabled = true;
      document.getElementById("gameArea").style.display = "block";

      await refreshInfo();
      setInterval(refreshInfo, 10000);
    } catch (e) {
      showMsg(e.message || JSON.stringify(e), "err");
    }
  }

  async function refreshInfo() {
    try {
      const [round, pot, , , lastWinner, lastWin] = await contract.getInfo();
      document.getElementById("round").textContent = "#" + round;
      document.getElementById("pot").textContent   = ethers.formatEther(pot) + " USDC";
      if (lastWinner !== ethers.ZeroAddress) {
        document.getElementById("winnerBox").style.display = "block";
        document.getElementById("lastWinner").textContent  = lastWinner.slice(0,6) + "..." + lastWinner.slice(-4);
        document.getElementById("lastWin").textContent     = ethers.formatEther(lastWin);
      }
    } catch(e) { console.error("refreshInfo:", e); }
  }

  async function submitGuess() {
    if (!selectedNumber) return;
    const btn = document.getElementById("guessBtn");
    btn.disabled = true;
    btn.textContent = "Sending...";
    showMsg("Submitting transaction...", "info");
    try {
      const tx      = await contract.guess(selectedNumber, { value: ethers.parseEther("0.01") });
      showMsg("Waiting for confirmation...", "info");
      const receipt = await tx.wait();
      const iface   = new ethers.Interface(ABI);
      let won = false;
      for (const log of receipt.logs) {
        try { const p = iface.parseLog(log); if (p.name === "Guessed") { won = p.args.correct; break; } } catch {}
      }
      won ? showMsg("🎉 YOU WON! The pot is yours!", "win") : showMsg(`❌ Wrong! The number wasn't ${selectedNumber}. Try again!`, "lose");
      await refreshInfo();
    } catch (e) {
      showMsg(e.reason || e.message, "err");
    }
    btn.disabled = false;
    btn.textContent = `Guess ${selectedNumber} →`;
  }

  function showMsg(text, type) {
    const el = document.getElementById("msg");
    el.className = "msg " + type;
    el.textContent = text;
  }
</script>
</body>
</html>
