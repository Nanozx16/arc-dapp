<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 ARC Guess Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #12121e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 40px rgba(100, 80, 255, 0.15);
    }

    h1 { font-size: 2rem; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      background: #0d0d1a;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .stat-row span:last-child { color: #a78bfa; font-weight: 600; }

    .numbers {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 24px 0;
    }

    .num-btn {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0ff;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 16px 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .num-btn:hover  { background: #6d28d9; border-color: #7c3aed; transform: scale(1.05); }
    .num-btn.selected { background: #7c3aed; border-color: #a78bfa; }
    .num-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .guess-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .guess-btn:hover    { opacity: 0.85; }
    .guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .connect-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #059669, #0d9488);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      transition: opacity 0.2s;
    }
    .connect-btn:hover { opacity: 0.85; }

    .msg {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
    }
    .msg.win  { background: #064e3b; color: #6ee7b7; display: block; }
    .msg.lose { background: #1e1b4b; color: #a5b4fc; display: block; }
    .msg.err  { background: #450a0a; color: #fca5a5; display: block; }
    .msg.info { background: #1e1b4b; color: #a5b4fc; display: block; }

    .winner-box {
      margin-top: 12px;
      padding: 10px 14px;
      background: #0d0d1a;
      border-radius: 10px;
      font-size: 0.78rem;
      color: #888;
      word-break: break-all;
    }
    .winner-box span { color: #a78bfa; }

    .fee-note { text-align: center; color: #555; font-size: 0.8rem; margin-top: 10px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎯 ARC Guess Game</h1>
  <p class="subtitle">Pick a number 1–10 · Pay 0.01 · Win the pot!</p>

  <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

  <div id="gameArea" style="display:none">
    <div class="stat-row"><span>Round</span><span id="round">#—</span></div>
    <div class="stat-row"><span>Pot</span><span id="pot">— USDC</span></div>
    <div class="stat-row"><span>Entry Fee</span><span>0.01 USDC</span></div>

    <div class="numbers" id="numbers"></div>

    <button class="guess-btn" id="guessBtn" onclick="submitGuess()" disabled>Select a number</button>
    <p class="fee-note">90% of pot goes to winner · 10% fee</p>

    <div class="msg" id="msg"></div>

    <div class="winner-box" id="winnerBox" style="display:none">
      Last winner: <span id="lastWinner"></span><br/>
      Won: <span id="lastWin"></span> USDC
    </div>
  </div>
</div>
